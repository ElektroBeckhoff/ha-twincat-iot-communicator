acknowledge_message:
  fields:
    device_name:
      required: true
      example: "Usermode"
      selector:
        text:
    config_entry_id:
      required: false
      example: "01KPNHY28GSS0WXWVW8DVFR0JY"
      selector:
        text:
    message_id:
      required: false
      example: "1"
      selector:
        text:
    acknowledgement:
      required: false
      default: "Acknowledged"
      example: "Read"
      selector:
        text:

delete_message:
  fields:
    device_name:
      required: true
      example: "Usermode"
      selector:
        text:
    config_entry_id:
      required: false
      example: "01KPNHY28GSS0WXWVW8DVFR0JY"
      selector:
        text:
    message_id:
      required: false
      example: "1"
      selector:
        text:

send_message:
  fields:
    device_name:
      required: true
      example: "Usermode"
      selector:
        text:
    config_entry_id:
      required: false
      example: "01KPNHY28GSS0WXWVW8DVFR0JY"
      selector:
        text:
    message:
      required: true
      example: "Hello from Home Assistant"
      selector:
        text:
    type:
      required: false
      default: "Default"
      selector:
        select:
          options:
            - "Default"
            - "Info"
            - "Warning"
            - "Error"
            - "Critical"

