blueprint:
  name: "TcIoT: Nachrichten nur außerhalb der Ruhezeiten"
  description: >-
    Leitet PLC-Nachrichten als Push-Benachrichtigung weiter, aber nur außerhalb
    der konfigurierten Ruhezeiten. Kritische Nachrichten (Error/Critical)
    können optional auch während der Ruhezeiten zugestellt werden.
  domain: automation
  author: twincat_iot_communicator
  input:
    message_event:
      name: PLC-Nachrichten Event
      description: Die "PLC messages" Event-Entität des TcIoT-Gerätes.
      selector:
        entity:
          filter:
            - integration: twincat_iot_communicator
              domain: event
    quiet_start:
      name: Ruhezeit Beginn
      description: Ab dieser Uhrzeit werden keine Benachrichtigungen gesendet.
      default: "22:00:00"
      selector:
        time:
    quiet_end:
      name: Ruhezeit Ende
      description: Ab dieser Uhrzeit werden wieder Benachrichtigungen gesendet.
      default: "07:00:00"
      selector:
        time:
    bypass_for_critical:
      name: Kritische immer zustellen
      description: >-
        Wenn aktiviert, werden Error- und Critical-Nachrichten auch während
        der Ruhezeit zugestellt.
      default: true
      selector:
        boolean:
    notify_device:
      name: Benachrichtigungs-Gerät
      description: Mobilgerät, das die Benachrichtigung empfangen soll.
      selector:
        device:
          filter:
            integration: mobile_app

mode: queued
max_exceeded: silent
max: 25

triggers:
  - trigger: state
    entity_id: !input message_event

conditions:
  - condition: template
    value_template: >-
      {% set msg_type = trigger.to_state.attributes.get('type', 'Info') %}
      {% set bypass = bypass_for_critical and msg_type in ['Error', 'Critical'] %}
      {% set qs = today_at(quiet_start) %}
      {% set qe = today_at(quiet_end) %}
      {% set t = now() %}
      {% if qs > qe %}
        {% set in_quiet = t >= qs or t < qe %}
      {% else %}
        {% set in_quiet = qs <= t < qe %}
      {% endif %}
      {{ trigger.to_state.state not in ['unknown', 'unavailable']
         and (bypass or not in_quiet) }}

actions:
  - variables:
      bypass_for_critical: !input bypass_for_critical
      quiet_start: !input quiet_start
      quiet_end: !input quiet_end
      msg_type: "{{ trigger.to_state.attributes.get('type', 'Info') }}"
      msg_text: "{{ trigger.to_state.attributes.get('text', '') }}"
      msg_id: "{{ trigger.to_state.attributes.get('message_id', '') }}"
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: "TcIoT {{ msg_type }}"
    message: "{{ msg_text }}"
    data:
      group: twincat_iot_messages
      tag: "tciot_{{ msg_id }}"
