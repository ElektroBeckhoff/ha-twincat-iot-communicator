blueprint:
  name: "TcIoT: Alle PLC-Nachrichten weiterleiten"
  description: >-
    Sendet eine Push-Benachrichtigung für jede eingehende TwinCAT IoT
    Communicator Nachricht. Titel enthält den Nachrichtentyp (Info, Warning,
    Error, Critical), Body den Nachrichtentext.
  domain: automation
  author: twincat_iot_communicator
  input:
    message_event:
      name: PLC-Nachrichten Event
      description: Die "PLC messages" Event-Entität des TcIoT-Gerätes.
      selector:
        entity:
          filter:
            - integration: twincat_iot_communicator
              domain: event
    notify_device:
      name: Benachrichtigungs-Gerät
      description: Mobilgerät, das die Benachrichtigung empfangen soll.
      selector:
        device:
          filter:
            integration: mobile_app

mode: queued
max_exceeded: silent
max: 25

triggers:
  - trigger: state
    entity_id: !input message_event

conditions:
  - condition: template
    value_template: >-
      {{ trigger.to_state.state not in ['unknown', 'unavailable'] }}

actions:
  - variables:
      msg_type: "{{ trigger.to_state.attributes.get('type', 'Info') }}"
      msg_text: "{{ trigger.to_state.attributes.get('text', '') }}"
      msg_id: "{{ trigger.to_state.attributes.get('message_id', '') }}"
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: "TcIoT {{ msg_type }}"
    message: "{{ msg_text }}"
    data:
      group: twincat_iot_messages
      tag: "tciot_{{ msg_id }}"
