blueprint:
  name: "TcIoT: Nachrichten nach Schweregrad weiterleiten"
  description: >-
    Sendet eine Push-Benachrichtigung nur fuer TwinCAT IoT Communicator
    Nachrichten mit einem bestimmten Schweregrad (z.B. nur Error und Critical).
  domain: automation
  author: twincat_iot_communicator
  input:
    message_event:
      name: PLC-Nachrichten Event
      description: Die "PLC messages" Event-Entitaet des TcIoT-Geraetes.
      selector:
        entity:
          filter:
            - integration: twincat_iot_communicator
              domain: event
    severity_filter:
      name: Schweregrade
      description: Nur Nachrichten dieser Typen werden weitergeleitet.
      default:
        - Error
        - Critical
      selector:
        select:
          multiple: true
          options:
            - label: Default
              value: Default
            - label: Info
              value: Info
            - label: Warning
              value: Warning
            - label: Error
              value: Error
            - label: Critical
              value: Critical
    notify_device:
      name: Benachrichtigungs-Geraet
      description: Mobilgeraet, das die Benachrichtigung empfangen soll.
      selector:
        device:
          filter:
            integration: mobile_app

mode: queued
max_exceeded: silent
max: 25

triggers:
  - trigger: state
    entity_id: !input message_event

conditions:
  - condition: template
    value_template: >-
      {{ trigger.to_state.state not in ['unknown', 'unavailable']
         and trigger.to_state.attributes.get('type', '') in severity_filter }}

actions:
  - variables:
      severity_filter: !input severity_filter
      msg_type: "{{ trigger.to_state.attributes.get('type', 'Info') }}"
      msg_text: "{{ trigger.to_state.attributes.get('text', '') }}"
      msg_id: "{{ trigger.to_state.attributes.get('message_id', '') }}"
  - domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: "TcIoT {{ msg_type }}"
    message: "{{ msg_text }}"
    data:
      group: "twincat_iot_{{ msg_type | lower }}"
      tag: "tciot_{{ msg_id }}"
